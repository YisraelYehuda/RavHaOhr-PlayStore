<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rav HaOhr</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: #fff;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

#chat {
  height: 400px;
  overflow-y: auto;
  border: 1px solid #333;
  padding: 10px;
  border-radius: 10px;
  background: #111827;
}

.msg {
  margin: 10px 0;
}

.user {
  color: #60a5fa;
}

.rav {
  color: #34d399;
}

input {
  width: 70%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
}

button {
  padding: 10px 15px;
  border-radius: 8px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}
</style>

</head>
<body>

<div class="container">
  <h2>🕍 Rav HaOhr</h2>

  <div id="chat"></div>

  <input id="inputMsg" placeholder="Escreva sua mensagem..." />
  <button onclick="enviarMensagem()">Enviar</button>
</div>

<script>
let conversationId = "";

async function enviarMensagem() {
  const input = document.getElementById("inputMsg");
  const msg = input.value.trim();

  if (!msg) return;

  adicionarMensagem("Você", msg, "user");
  input.value = "";

  try {
    const resposta = await fetch("https://ravhaohr-dify-proxy.orhatorabrasil.workers.dev/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: msg,
        conversationId: conversationId,
        user: "usuario-logado"
      })
    });

    const data = await resposta.json();

    if (data.ok) {
      conversationId = data.conversationId || conversationId;
      adicionarMensagem("Rav HaOhr", data.answer, "rav");
    } else {
      adicionarMensagem("Erro", data.error || "Erro desconhecido");
    }

  } catch (e) {
    adicionarMensagem("Erro", "Falha na conexão.");
  }
}

function adicionarMensagem(remetente, texto, tipo) {
  const chat = document.getElementById("chat");

  const msg = document.createElement("div");
  msg.className = "msg " + tipo;
  msg.innerHTML = `<strong>${remetente}:</strong> ${texto}`;

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
