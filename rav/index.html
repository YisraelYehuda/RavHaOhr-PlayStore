<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RavHaOhr — אור הרב</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Cinzel:wght@400;500;600;700&family=Noto+Serif+Hebrew:wght@300;400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
/* ============================================================
   THEME SYSTEM — Day (blue) / Night (gold)
   ============================================================ */
:root {
  --bg-primary: #060d1f;
  --bg-secondary: #091428;
  --bg-card: #0d1e3a;
  --bg-message-user: #0f2347;
  --bg-message-rav: rgba(13,26,58,0.7);
  --accent: #2563c7;
  --accent-light: #3b82f6;
  --accent-glow: rgba(37,99,199,0.35);
  --gold: #c9a84c;
  --gold-light: #e2c06a;
  --gold-dim: rgba(201,168,76,0.2);
  --text-primary: #e8f0ff;
  --text-secondary: #8fa5cc;
  --text-muted: #4a6390;
  --border: rgba(37,99,199,0.22);
  --border-gold: rgba(201,168,76,0.25);
  --shadow-deep: 0 24px 80px rgba(0,0,0,0.7);
  --font-display: 'Cinzel', serif;
  --font-body: 'Cormorant Garamond', serif;
  --font-hebrew: 'Noto Serif Hebrew', serif;
  --font-text: 'EB Garamond', serif;
  --star-color: rgba(37,99,199,0.6);
  --shimmer: linear-gradient(135deg, var(--accent) 0%, #1a4a9a 50%, var(--accent-light) 100%);
}

body.night-mode {
  --bg-primary: #0c0800;
  --bg-secondary: #140f00;
  --bg-card: #1c1500;
  --bg-message-user: #2a1e00;
  --bg-message-rav: rgba(26,19,0,0.75);
  --accent: #b8892a;
  --accent-light: #d4a93e;
  --accent-glow: rgba(184,137,42,0.35);
  --text-primary: #f5e8c0;
  --text-secondary: #c4a86a;
  --text-muted: #7a5f30;
  --border: rgba(184,137,42,0.22);
  --border-gold: rgba(201,168,76,0.35);
  --star-color: rgba(201,168,76,0.5);
  --shimmer: linear-gradient(135deg, #b8892a 0%, #7a5010 50%, #d4a93e 100%);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  transition: background 0.8s ease, color 0.8s ease;
}

/* ============================================================
   STAR CANVAS BACKGROUND
   ============================================================ */
#stars-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.6;
}

/* ============================================================
   SCREENS
   ============================================================ */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.97);
}

/* ============================================================
   SPLASH SCREEN
   ============================================================ */
#splash {
  flex-direction: column;
  background: var(--bg-primary);
  z-index: 20;
}

.splash-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  animation: splashFadeIn 1s ease forwards;
}

@keyframes splashFadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.splash-menorah {
  font-size: 3.2rem;
  margin-bottom: 12px;
  animation: menorahPulse 3s ease-in-out infinite;
  filter: drop-shadow(0 0 18px var(--accent-glow));
}

@keyframes menorahPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%       { transform: scale(1.06); opacity: 0.85; }
}

.splash-title-he {
  font-family: var(--font-hebrew);
  font-size: clamp(2.4rem, 7vw, 3.8rem);
  font-weight: 700;
  color: var(--gold-light, #e2c06a);
  letter-spacing: 0.05em;
  text-shadow: 0 0 40px rgba(226,192,106,0.5);
  line-height: 1.1;
}

.splash-title-pt {
  font-family: var(--font-display);
  font-size: clamp(0.85rem, 2.5vw, 1.1rem);
  color: var(--text-secondary);
  letter-spacing: 0.35em;
  text-transform: uppercase;
  margin-top: 4px;
}

.splash-divider {
  width: 80px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-light), transparent);
  margin: 24px auto;
}

.splash-quote {
  font-family: var(--font-text);
  font-style: italic;
  font-size: clamp(0.95rem, 2.8vw, 1.15rem);
  color: var(--text-secondary);
  text-align: center;
  max-width: 340px;
  line-height: 1.7;
  min-height: 70px;
  transition: opacity 0.5s ease;
  padding: 0 20px;
}

.splash-quote.fade-out { opacity: 0; }
.splash-quote.fade-in  { opacity: 1; }

.splash-loader {
  margin-top: 32px;
  display: flex;
  gap: 8px;
  align-items: center;
}

.splash-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent-light);
  animation: dotPulse 1.5s ease-in-out infinite;
}
.splash-dot:nth-child(2) { animation-delay: 0.25s; }
.splash-dot:nth-child(3) { animation-delay: 0.5s; }

@keyframes dotPulse {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50%       { opacity: 1;   transform: scale(1.2); }
}

.splash-preparing {
  margin-top: 14px;
  font-family: var(--font-display);
  font-size: 0.72rem;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  text-transform: uppercase;
}

/* ============================================================
   LOGIN SCREEN
   ============================================================ */
#login {
  flex-direction: column;
  padding: 20px;
}

.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: clamp(32px, 6vw, 52px) clamp(28px, 5vw, 48px);
  max-width: 440px;
  width: 100%;
  box-shadow: var(--shadow-deep), 0 0 60px var(--accent-glow);
  animation: cardReveal 0.7s ease forwards;
  position: relative;
  overflow: hidden;
}

.login-card::before {
  content: '';
  position: absolute;
  top: -60%;
  left: -20%;
  width: 140%;
  height: 120%;
  background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

@keyframes cardReveal {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

.login-card > * { position: relative; z-index: 1; }

.login-logo {
  text-align: center;
  margin-bottom: 28px;
}

.login-logo .logo-he {
  font-family: var(--font-hebrew);
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--gold-light, #e2c06a);
  display: block;
  text-shadow: 0 0 30px rgba(226,192,106,0.4);
}

.login-logo .logo-pt {
  font-family: var(--font-display);
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  color: var(--text-muted);
  text-transform: uppercase;
  display: block;
  margin-top: 4px;
}

.login-title {
  font-family: var(--font-display);
  font-size: clamp(1.1rem, 3vw, 1.35rem);
  font-weight: 600;
  text-align: center;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.login-subtitle {
  font-family: var(--font-text);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--text-secondary);
  text-align: center;
  margin-bottom: 32px;
  line-height: 1.5;
}

.login-sep {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
}
.login-sep span {
  flex: 1;
  height: 1px;
  background: var(--border);
}
.login-sep em {
  font-family: var(--font-display);
  font-size: 0.68rem;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  font-style: normal;
  text-transform: uppercase;
}

.btn-google {
  width: 100%;
  padding: 14px 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-primary);
  font-family: var(--font-display);
  font-size: 0.88rem;
  letter-spacing: 0.08em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: all 0.3s ease;
}
.btn-google:hover {
  background: rgba(255,255,255,0.1);
  border-color: var(--accent-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--accent-glow);
}
.btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

.input-group { margin-bottom: 14px; }
.input-group input {
  width: 100%;
  padding: 13px 18px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-primary);
  font-family: var(--font-text);
  font-size: 1rem;
  outline: none;
  transition: all 0.3s ease;
}
.input-group input::placeholder { color: var(--text-muted); font-style: italic; }
.input-group input:focus {
  border-color: var(--accent-light);
  background: rgba(255,255,255,0.07);
  box-shadow: 0 0 20px var(--accent-glow);
}

.btn-primary {
  width: 100%;
  padding: 14px 20px;
  background: var(--shimmer);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: var(--font-display);
  font-size: 0.88rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.btn-primary::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
}
.btn-primary:hover::after { opacity: 1; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--accent-glow); }

.login-toggle {
  text-align: center;
  margin-top: 16px;
  font-family: var(--font-text);
  font-size: 0.9rem;
  color: var(--text-muted);
}
.login-toggle a {
  color: var(--accent-light);
  cursor: pointer;
  text-decoration: none;
  transition: color 0.2s;
}
.login-toggle a:hover { color: var(--gold); }

.login-version {
  text-align: center;
  margin-top: 20px;
  font-family: var(--font-display);
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  opacity: 0.6;
}

/* ============================================================
   MAIN APP
   ============================================================ */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding: 0;
  z-index: 10;
}
#app.hidden { display: none; }

/* ---- Header ---- */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  background: rgba(6,13,31,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  flex-shrink: 0;
  position: relative;
  z-index: 5;
  transition: background 0.8s ease, border-color 0.8s ease;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

body.night-mode .app-header {
  background: rgba(12,8,0,0.92);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--shimmer);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-hebrew);
  font-size: 1.1rem;
  color: #fff;
  box-shadow: 0 0 20px var(--accent-glow);
  flex-shrink: 0;
  position: relative;
  animation: avatarGlow 4s ease-in-out infinite;
}

@keyframes avatarGlow {
  0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
  50%       { box-shadow: 0 0 35px var(--accent-glow), 0 0 60px var(--accent-glow); }
}

.header-avatar .status-dot {
  position: absolute;
  bottom: 1px;
  right: 1px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #22c55e;
  border: 2px solid var(--bg-primary);
  animation: statusPulse 2s ease-in-out infinite;
}
@keyframes statusPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%       { transform: scale(1.3); opacity: 0.7; }
}

.header-title {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.header-title .ht-main {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.05em;
}
.header-title .ht-sub {
  font-family: var(--font-hebrew);
  font-size: 0.75rem;
  color: var(--gold);
  opacity: 0.8;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-clock {
  font-family: var(--font-display);
  font-size: 0.8rem;
  color: var(--text-secondary);
  letter-spacing: 0.08em;
  opacity: 0.9;
}

.btn-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  font-size: 1rem;
  position: relative;
}
.btn-icon:hover {
  border-color: var(--accent-light);
  color: var(--text-primary);
  background: rgba(255,255,255,0.08);
}

/* ---- Chat area ---- */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
}

.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}

/* Welcome banner */
.welcome-banner {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 32px 20px 20px;
  animation: wbReveal 1s ease forwards;
}

@keyframes wbReveal {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.wb-menorah {
  font-size: 2.2rem;
  margin-bottom: 12px;
  filter: drop-shadow(0 0 12px var(--accent-glow));
  animation: menorahPulse 4s ease-in-out infinite;
}

.wb-title {
  font-family: var(--font-hebrew);
  font-size: clamp(1.4rem, 4vw, 1.8rem);
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 6px;
  text-shadow: 0 0 20px rgba(201,168,76,0.4);
}

.wb-greeting {
  font-family: var(--font-text);
  font-style: italic;
  font-size: clamp(1rem, 3vw, 1.15rem);
  color: var(--text-secondary);
  line-height: 1.7;
  max-width: 360px;
  margin-bottom: 20px;
}

.wb-topics {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  max-width: 400px;
}

.topic-pill {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-family: var(--font-display);
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
  background: rgba(255,255,255,0.03);
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  text-transform: uppercase;
}
.topic-pill:hover {
  border-color: var(--accent-light);
  color: var(--text-primary);
  background: rgba(255,255,255,0.07);
  transform: translateY(-3px) scale(1.04);
  box-shadow: 0 6px 20px var(--accent-glow);
}

.wb-dev-notice {
  margin-top: 24px;
  background: var(--gold-dim);
  border: 1px solid var(--border-gold);
  border-radius: 14px;
  padding: 14px 18px;
  max-width: 380px;
  width: 100%;
}
.wb-dev-notice p {
  font-family: var(--font-text);
  font-style: italic;
  font-size: 0.88rem;
  color: var(--gold);
  line-height: 1.6;
  opacity: 0.9;
}

/* Messages */
.message {
  display: flex;
  gap: 12px;
  max-width: 100%;
  animation: msgSlide 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

@keyframes msgSlide {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.message.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  align-self: flex-end;
}

.message.rav .msg-avatar {
  background: var(--shimmer);
  box-shadow: 0 0 15px var(--accent-glow);
  font-family: var(--font-hebrew);
  color: #fff;
  font-size: 1rem;
}

.message.user .msg-avatar {
  background: rgba(255,255,255,0.1);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

.msg-bubble {
  max-width: calc(100% - 60px);
  padding: 14px 18px;
  border-radius: 18px;
  line-height: 1.75;
  font-family: var(--font-text);
  font-size: clamp(1rem, 2.8vw, 1.08rem);
  position: relative;
  transition: box-shadow 0.2s ease;
}

.message.rav .msg-bubble {
  background: var(--bg-message-rav);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text-primary);
  backdrop-filter: blur(12px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.message.user .msg-bubble {
  background: var(--bg-message-user);
  border: 1px solid var(--border);
  border-bottom-right-radius: 4px;
  color: var(--text-primary);
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

.msg-meta {
  font-family: var(--font-display);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 6px;
  opacity: 0.7;
}

/* Typing indicator */
.typing-indicator {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  animation: msgSlide 0.3s ease forwards;
}

.typing-indicator .msg-avatar {
  background: var(--shimmer);
  box-shadow: 0 0 15px var(--accent-glow);
  font-family: var(--font-hebrew);
  color: #fff;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}

.typing-bubble {
  background: var(--bg-message-rav);
  border: 1px solid var(--border);
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  padding: 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  backdrop-filter: blur(10px);
}

.typing-text {
  font-family: var(--font-text);
  font-style: italic;
  font-size: 0.85rem;
  color: var(--text-secondary);
  opacity: 0.8;
  min-width: 180px;
  min-height: 18px;
  transition: opacity 0.4s;
}

.typing-dots {
  display: flex;
  gap: 5px;
  align-items: center;
  margin-top: 4px;
}
.typing-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent-light);
  animation: dotPulse 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

/* ---- Input bar ---- */
.input-bar {
  padding: 12px 16px 18px;
  border-top: 1px solid var(--border);
  background: rgba(6,13,31,0.95);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  flex-shrink: 0;
  transition: background 0.8s ease;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
}

body.night-mode .input-bar {
  background: rgba(12,8,0,0.95);
}

.input-hint {
  font-family: var(--font-hebrew);
  font-size: 0.8rem;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 10px;
  opacity: 0.6;
  letter-spacing: 0.05em;
}

.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-row textarea {
  flex: 1;
  min-height: 48px;
  max-height: 120px;
  padding: 13px 18px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 24px;
  color: var(--text-primary);
  font-family: var(--font-text);
  font-size: 1rem;
  outline: none;
  resize: none;
  transition: all 0.3s ease;
  line-height: 1.5;
  overflow-y: auto;
}
.input-row textarea::placeholder { color: var(--text-muted); font-style: italic; }
.input-row textarea:focus {
  border-color: var(--accent-light);
  background: rgba(255,255,255,0.07);
  box-shadow: 0 0 20px var(--accent-glow);
}

.btn-send {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--shimmer);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.25s ease;
  box-shadow: 0 4px 15px var(--accent-glow);
}
.btn-send:hover {
  transform: scale(1.08) translateY(-2px);
  box-shadow: 0 8px 24px var(--accent-glow);
}
.btn-send:active { transform: scale(0.96); }
.btn-send svg { width: 20px; height: 20px; fill: #fff; }
