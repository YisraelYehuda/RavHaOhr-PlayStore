<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rav HaOhr — Login</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#111a2e;
      --line:#223354;
      --text:#eaf1ff;
      --muted:#9cb0d8;
      --accent:#2563eb;
      --accent2:#1d4ed8;
      --ok:#22c55e;
      --danger:#ef4444;
      --gold:#d4af37;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(37,99,235,.18), transparent 35%),
        linear-gradient(180deg, #08101d 0%, #0b1220 100%);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .wrap{
      width:100%;
      max-width:430px;
    }
    .card{
      background:rgba(17,26,46,.94);
      border:1px solid var(--line);
      border-radius:22px;
      padding:26px 20px 20px;
      box-shadow:0 18px 60px rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
    }
    .logo{
      text-align:center;
      margin-bottom:20px;
    }
    .logo .he{
      font-size:2rem;
      font-weight:700;
      color:var(--gold);
      margin-bottom:4px;
    }
    .logo .pt{
      font-size:1.15rem;
      font-weight:700;
      letter-spacing:.04em;
    }
    .sub{
      text-align:center;
      color:var(--muted);
      font-size:.96rem;
      line-height:1.45;
      margin-bottom:20px;
    }
    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px 16px;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn:disabled{opacity:.65;cursor:not-allowed;transform:none}
    .btn-google{
      background:#fff;
      color:#111827;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-bottom:16px;
    }
    .btn-primary{
      background:linear-gradient(180deg,var(--accent),var(--accent2));
      color:#fff;
    }
    .btn-secondary{
      background:transparent;
      color:var(--muted);
      border:1px solid var(--line);
      margin-top:12px;
    }
    .sep{
      display:flex;
      align-items:center;
      gap:10px;
      margin:18px 0 16px;
      color:var(--muted);
      font-size:.85rem;
    }
    .sep::before,.sep::after{
      content:"";
      flex:1;
      height:1px;
      background:var(--line);
    }
    .field{
      margin-bottom:12px;
    }
    .field label{
      display:block;
      margin-bottom:6px;
      font-size:.9rem;
      color:var(--muted);
    }
    .field input{
      width:100%;
      border:1px solid var(--line);
      background:#0b1324;
      color:var(--text);
      border-radius:12px;
      padding:13px 14px;
      font-size:1rem;
      outline:none;
    }
    .field input:focus{
      border-color:#3b82f6;
      box-shadow:0 0 0 3px rgba(59,130,246,.15);
    }
    .row{
      display:flex;
      gap:10px;
    }
    .row > *{flex:1}
    .toggle{
      margin-top:14px;
      text-align:center;
      color:var(--muted);
      font-size:.92rem;
    }
    .toggle a{
      color:#8ab4ff;
      text-decoration:none;
      font-weight:700;
      cursor:pointer;
    }
    .status{
      margin-top:14px;
      min-height:22px;
      text-align:center;
      font-size:.92rem;
      color:var(--muted);
      word-break:break-word;
    }
    .status.ok{color:var(--ok)}
    .status.err{color:var(--danger)}
    .loading{
      display:none;
      text-align:center;
      margin-top:12px;
      color:var(--muted);
      font-size:.92rem;
    }
    .version{
      text-align:center;
      margin-top:16px;
      color:#7284a8;
      font-size:.78rem;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .hidden{display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo">
        <div class="he">רַב הָאוֹר</div>
        <div class="pt">Rav HaOhr</div>
      </div>

      <div class="sub">
        Entre com sua conta para acessar o Rav e continuar sua jornada de estudo.
      </div>

      <button id="googleBtn" class="btn btn-google" onclick="loginGoogle()">
        <span>🔐</span>
        <span>Entrar com Google</span>
      </button>

      <div class="sep">ou</div>

      <div id="loginBox">
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" type="email" placeholder="seuemail@gmail.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input id="password" type="password" placeholder="Digite sua senha" autocomplete="current-password">
        </div>
        <button id="loginBtn" class="btn btn-primary" onclick="loginEmail()">Entrar com e-mail</button>
        <div class="toggle">
          Ainda não tem conta? <a onclick="showRegister()">Criar conta</a>
        </div>
      </div>

      <div id="registerBox" class="hidden">
        <div class="field">
          <label for="name">Nome</label>
          <input id="name" type="text" placeholder="Seu nome">
        </div>
        <div class="field">
          <label for="regEmail">E-mail</label>
          <input id="regEmail" type="email" placeholder="seuemail@gmail.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="regPassword">Senha</label>
          <input id="regPassword" type="password" placeholder="Crie uma senha (mín. 6)" autocomplete="new-password">
        </div>
        <button id="registerBtn" class="btn btn-primary" onclick="registerEmail()">Criar conta</button>
        <div class="toggle">
          Já tem conta? <a onclick="showLogin()">Entrar</a>
        </div>
      </div>

      <div id="loading" class="loading">Conectando ao Firebase…</div>
      <div id="status" class="status">Aguardando autenticação…</div>
      <div class="version">Rav HaOhr · Login Firebase · Cloudflare Pages</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithRedirect,
      getRedirectResult,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      updateProfile,
      onAuthStateChanged,
      browserLocalPersistence,
      setPersistence
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCbFI4xgkHCw8eY8JRcpOrokOyBpxzDhk0",
      authDomain: "ravhaohr.firebaseapp.com",
      projectId: "ravhaohr",
      storageBucket: "ravhaohr.firebasestorage.app",
      messagingSenderId: "919621617899",
      appId: "1:919621617899:web:f3cc2ac7ac4fc87d9856ae",
      measurementId: "G-E5HYDV7YN2"
    };

    const statusEl = document.getElementById("status");
    const loadingEl = document.getElementById("loading");
    const googleBtn = document.getElementById("googleBtn");
    const loginBtn = document.getElementById("loginBtn");
    const registerBtn = document.getElementById("registerBtn");

    function setStatus(text, type=""){
      statusEl.textContent = text;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function setLoading(isLoading){
      loadingEl.style.display = isLoading ? "block" : "none";
      googleBtn.disabled = isLoading;
      loginBtn.disabled = isLoading;
      registerBtn.disabled = isLoading;
    }

    window.showRegister = function(){
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("registerBox").classList.remove("hidden");
      setStatus("Crie sua conta para acessar o Rav.");
    }

    window.showLogin = function(){
      document.getElementById("registerBox").classList.add("hidden");
      document.getElementById("loginBox").classList.remove("hidden");
      setStatus("Entre com Google ou e-mail.");
    }

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: "select_account" });

    await setPersistence(auth, browserLocalPersistence);

    async function goToRav(){
      setStatus("Login concluído. Entrando no Rav…", "ok");
      window.location.href = "/rav";
    }

    async function handleAuthError(error){
      console.error(error);
      const map = {
        "auth/unauthorized-domain": "Domínio não autorizado no Firebase.",
        "auth/popup-blocked": "O navegador bloqueou o login. Tente novamente.",
        "auth/popup-closed-by-user": "O login foi fechado antes de terminar.",
        "auth/invalid-credential": "Credenciais inválidas.",
        "auth/user-not-found": "E-mail não encontrado.",
        "auth/wrong-password": "Senha incorreta.",
        "auth/email-already-in-use": "Este e-mail já está em uso.",
        "auth/invalid-email": "E-mail inválido.",
        "auth/weak-password": "Senha fraca. Use pelo menos 6 caracteres."
      };
      setStatus(map[error.code] || ("Erro: " + (error.message || error.code)), "err");
    }

    window.loginGoogle = async function(){
      try{
        setLoading(true);
        setStatus("Abrindo autenticação Google…");
        await signInWithRedirect(auth, provider);
      }catch(error){
        setLoading(false);
        await handleAuthError(error);
      }
    }

    window.loginEmail = async function(){
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if(!email || !password){
        setStatus("Preencha e-mail e senha.", "err");
        return;
      }

      try{
        setLoading(true);
        setStatus("Entrando com e-mail…");
        await signInWithEmailAndPassword(auth, email, password);
        await goToRav();
      }catch(error){
        setLoading(false);
        await handleAuthError(error);
      }
    }

    window.registerEmail = async function(){
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value.trim();

      if(!name || !email || !password){
        setStatus("Preencha nome, e-mail e senha.", "err");
        return;
      }
      if(password.length < 6){
        setStatus("A senha precisa ter pelo menos 6 caracteres.", "err");
        return;
      }

      try{
        setLoading(true);
        setStatus("Criando sua conta…");
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: name });
        await goToRav();
      }catch(error){
        setLoading(false);
        await handleAuthError(error);
      }
    }

    try{
      setLoading(true);
      const redirectResult = await getRedirectResult(auth);
      if (redirectResult?.user){
        await goToRav();
      }
    }catch(error){
      await handleAuthError(error);
    }finally{
      setLoading(false);
    }

    onAuthStateChanged(auth, async (user) => {
      if(user){
        const who = user.displayName || user.email || "usuário";
        setStatus("Sessão ativa: " + who, "ok");
      }else{
        setStatus("Entre com Google ou e-mail.");
      }
    });
  </script>
</body>
</html>
